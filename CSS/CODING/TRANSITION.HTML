<!DOCTYPE html>
<html>
<head>
  <title>CSS Transition Example</title>

  <style>
    .box{
      width:150px;
      height:150px;
      background:red;

      /* Transition */
      transition: 0.5s;
    }

    .box:hover{
      background:blue;
      transform:scale(1.2);
      border-radius:20px;
    }
  </style>
</head>
<body>

  <h1>CSS Transition Example</h1>

  <div class="box"></div>

</body>
</html>
